name: Generate Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: cd scripts && npm install
        
      - name: Generate feed
        run: node scripts/index.js
        
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update feeds [skip ci]" || exit 0
          git push
          
      - name: Send to Feishu
        run: |
          # 提取 README 前 500 字并转义为 JSON 字符串
          CONTENT=$(head -c 500 README.md | python3 -c "import json, sys; print(json.dumps(sys.stdin.read()))")
          curl -X POST "${{ secrets.FEISHUWEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"msg_type\": \"post\",
            \"content\": {
              \"post\": {
                \"zh_cn\": {
                  \"title\": \"🚀 AI 开发者日报更新啦\",
                  \"content\": [
                    [{\"tag\": \"text\", \"text\": $CONTENT}],
                    [{\"tag\": \"a\", \"text\": \"点击查看完整内容\", \"href\": \"https://github.com/${{ github.repository }}\"}]
                  ]
                }
              }
            }
          }"
